name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install scons mingw-w64 zlib

      - name: Install CppUnit
        run: brew install --verbose cppunit

      - name: Prepare zlib directory
        run: |
          curl --retry 9 -sLo $HOME/zlib.zip "https://downloads.sourceforge.net/project/libpng/zlib/1.2.8/zlib128-dll.zip?r=&ts=1403402496&use_mirror=hivelocity"
          mkdir -p $HOME/zlib
          unzip -o $HOME/zlib.zip -d $HOME/zlib

      - name: look for HelperMacros.h
        run: |
          if [ -f /usr/local/include/HelperMacros.h ]; then
            echo "HelperMacros.h found in /usr/local/include"
          else
            echo "HelperMacros.h not found in /usr/local/include"
            matches=$(find /usr /opt/homebrew/include "$HOME" -name HelperMacros.h 2>/dev/null | head -n 20)
            if [ -n "$matches" ]; then
              echo "$matches"
            else
              echo "HelperMacros.h not found in common include paths"
            fi
          fi

      - name: Run scons (allow failure)
        continue-on-error: true
        run: scons ZLIB_W32=$HOME/zlib SKIPUTILS="NSIS Menu" NSIS_CONFIG_LOG=yes test dist-zip

      - name: Print config.log
        if: always()
        run: |
          if [ -f config.log ]; then
            cat config.log
          else
            echo "config.log not found"
          fi
